<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Face Auth System</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@0..1"
      rel="stylesheet"
    />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <span class="material-symbols-rounded">lock_person</span>
          </div>
          <h1>Face Auth System</h1>
          <p>Đăng nhập vào tài khoản của bạn</p>
        </div>

        <div class="tab-bar">
          <button class="tab-btn active" data-tab="face">Khuôn mặt</button>
          <button class="tab-btn" data-tab="password">Mật khẩu</button>
        </div>

        <!-- Face login tab -->
        <div id="tab-face" class="tab-content">
          <label>Tên đăng nhập</label>
          <input id="faceUsername" placeholder="votanduy002455@gmail.com" />
          <div class="cam-box">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <p
              id="cameraLabel"
              style="
                text-align: center;
                color: #8a96a8;
                margin: 0;
                padding: 12px 0;
                font-size: 14px;
              "
            >
              Camera Preview
            </p>
          </div>
          <div class="row" style="margin-top: 12px; gap: 8px">
            <button id="btnStartCam" class="secondary" style="flex: 1">
              Mở webcam
            </button>
            <button id="btnCapture" class="secondary" style="flex: 1">
              Chụp ảnh
            </button>
          </div>
          <p id="captureState" class="hint">Chưa chụp ảnh.</p>
          <button id="btnFaceLogin" class="btn-full">Đăng nhập</button>
        </div>

        <!-- Password login tab -->
        <div id="tab-password" class="tab-content" style="display: none">
          <label>Tên đăng nhập</label>
          <input id="loginUsername" placeholder="Nhập tên đăng nhập" />
          <label>Mật khẩu</label>
          <input
            id="loginPassword"
            type="password"
            placeholder="Nhập mật khẩu"
          />
          <button id="btnPasswordLogin" class="btn-full">Đăng nhập</button>
        </div>

        <div
          id="status"
          class="status success"
          style="margin-top: 12px; text-align: center; margin-bottom: 0"
        >
          Sẵn sàng.
        </div>

        <div class="auth-footer">
          Chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a>
        </div>
      </div>
    </div>

    <script src="./assets/config.js"></script>
    <script src="./assets/common.js"></script>
    <script src="./assets/index.js"></script>
  </body>
</html>
