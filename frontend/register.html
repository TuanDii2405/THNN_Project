<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - Face Auth System</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@0..1"
      rel="stylesheet"
    />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <span class="material-symbols-rounded">lock_person</span>
          </div>
          <h1>Face Auth System</h1>
          <p>Đăng ký tài khoản mới</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
          <div>
            <label>Họ và tên</label>
            <input id="regFullName" placeholder="Nhập họ và tên" />
          </div>
          <div>
            <label>Ngày sinh</label>
            <input
              id="frontBirthDate"
              class="ocr-readonly"
              type="text"
              placeholder="Máy sẽ đọc từ ảnh CCCD"
              readonly
            />
          </div>
        </div>

        <label>Số điện thoại</label>
        <input id="regPhone" placeholder="Nhập số điện thoại" type="tel" />

        <label>Tên đăng nhập (email)</label>
        <input id="regUsername" placeholder="ví dụ: user@gmail.com" />

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
          <div>
            <label>Số CCCD</label>
            <input
              id="frontCccdNumber"
              class="ocr-readonly"
              type="text"
              placeholder="Máy sẽ đọc từ ảnh CCCD"
              readonly
            />
          </div>
          <div>
            <label>Ngày cấp</label>
            <input
              id="backIssuedDate"
              class="ocr-readonly"
              type="text"
              placeholder="Máy sẽ đọc từ ảnh CCCD"
              readonly
            />
          </div>
        </div>

        <label>Mật khẩu</label>
        <input id="regPassword" type="password" placeholder="Nhập mật khẩu" />

        <!-- Hidden file inputs for CCCD -->
        <input
          id="regCccdFront"
          type="file"
          accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp"
          tabindex="-1"
          aria-hidden="true"
          style="
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
          "
        />
        <input
          id="regCccdBack"
          type="file"
          accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp"
          tabindex="-1"
          aria-hidden="true"
          style="
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
          "
        />

        <!-- Hidden optional fields for backend compatibility -->
        <input id="regGender" type="hidden" value="Nam" />
        <input id="regEmail" type="hidden" />

        <div
          style="
            margin: 16px 0;
            padding: 14px;
            background: #f8fafc;
            border-left: 3px solid #2f88e4;
            border-radius: 6px;
          "
        >
          <h3
            style="
              margin: 0 0 12px;
              font-size: 14px;
              font-weight: 600;
              color: #1b2738;
            "
          >
            Thông tin xác thực ảnh
          </h3>
          <div class="upload-grid">
            <label
              id="cardPickFront"
              class="upload-card"
              for="regCccdFront"
              tabindex="0"
              role="button"
            >
              <span class="material-symbols-rounded">add</span>
              <p>CCCD mặt trước</p>
            </label>
            <label
              id="cardPickBack"
              class="upload-card"
              for="regCccdBack"
              tabindex="0"
              role="button"
            >
              <span class="material-symbols-rounded">add</span>
              <p>CCCD mặt sau</p>
            </label>
            <button id="btnStartCam" class="upload-card" type="button">
              <span class="material-symbols-rounded">photo_camera</span>
              <p>Mở camera mặt</p>
            </button>
          </div>

          <div class="cam-box" style="margin-top: 12px">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
          </div>
          <div class="row" style="margin-top: 10px">
            <button id="btnCapture" class="secondary" type="button">
              Chụp ảnh khuôn mặt
            </button>
          </div>

          <p id="frontState" class="hint">Chưa chọn ảnh CCCD mặt trước.</p>
          <p id="backState" class="hint">Chưa chọn ảnh CCCD mặt sau.</p>
          <p id="captureState" class="hint">Chưa chụp ảnh khuôn mặt.</p>
        </div>

        <button id="btnRegister" class="btn-full">Đăng ký tài khoản</button>

        <div
          id="status"
          class="status success"
          style="margin-top: 12px; text-align: center"
        >
          Sẵn sàng.
        </div>

        <div class="auth-footer">
          Đã có tài khoản? <a href="./index.html">Đăng nhập</a>
        </div>
      </div>
    </div>

    <script src="./assets/config.js?v=20260425-5"></script>
    <script src="./assets/common.js?v=20260425-5"></script>
    <script src="./assets/register.js?v=20260425-5"></script>
  </body>
</html>
